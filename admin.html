function doLogin(){
  var pw = document.getElementById("pw").value;
  if(pw === PASSWORD){
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "flex";
    document.getElementById("admin").style.flexDirection = "column";
    loadData();
    updateStats();
    renderCats();
  } else {
    document.getElementById("login-err").style.display = "block";
    document.getElementById("pw").value = "";
  }
}

function logout(){
  document.getElementById("login").style.display = "flex";
  document.getElementById("admin").style.display = "none";
  document.getElementById("pw").value = "";
  document.getElementById("login-err").style.display = "none";
}

function loadData(){
  try {
    var s = localStorage.getItem("koino_data");
    DATA = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch(e) {
    DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveData(){
  localStorage.setItem("koino_data", JSON.stringify(DATA));
  updateStats();
}

function updateStats(){
  var total=0, cats=0;
  Object.values(DATA).forEach(function(seg){
    cats += seg.length;
    seg.forEach(function(c){ total += c.cards.length; });
  });
  var ins = (DATA.insight||[]).reduce(function(a,c){ return a + c.cards.length; }, 0);
  var cop = (DATA.couple||[]).reduce(function(a,c){ return a + c.cards.length; }, 0);
  var fun = (DATA.fun||[]).reduce(function(a,c){ return a + c.cards.length; }, 0);

  document.getElementById("stats").innerHTML =
    '<div class="stat"><div class="stat-n">'+total+'</div><div class="stat-l">TOTAL</div></div>'+
    '<div class="stat"><div class="stat-n">'+cats+'</div><div class="stat-l">CATEGORIES</div></div>'+
    '<div class="stat"><div class="stat-n">'+ins+'</div><div class="stat-l">INSIGHT</div></div>'+
    '<div class="stat"><div class="stat-n">'+cop+'</div><div class="stat-l">COUPLE</div></div>'+
    '<div class="stat"><div class="stat-n">'+fun+'</div><div class="stat-l">FUN</div></div>';
}

function buildEmojiGrid(){
  var g = document.getElementById("emoji-grid");
  g.innerHTML = EMOJIS.map(function(e){ return '<span class="ep">'+e+'</span>'; }).join("");
  g.querySelectorAll(".ep").forEach(function(el){
    el.addEventListener("click", function(){
      document.getElementById("nc-emoji").value = el.textContent;
      g.querySelectorAll(".ep").forEach(function(x){ x.classList.remove("sel"); });
      el.classList.add("sel");
    });
  });
}

function setSeg(el, s){
  document.querySelectorAll(".stab").forEach(function(t){ t.classList.remove("on"); });
  el.classList.add("on");
  activeSeg = s;
  renderCats();
}

            (card.hint ? '<div class="card-item-hint">'+esc(card.hint)+'</div>' : '')+
          '</div>'+
          '<div class="card-item-acts">'+
            '<button class="ci-btn ci-edit" type="button" data-seg="'+activeSeg+'" data-cat="'+cat.id+'" data-ci="'+ci+'">Edit</button>'+

          '</div>'+
        '</div>';
    });

    out +=
      '<div class="ccat" id="ccat-'+cat.id+'">'+
        '<div class="ccat-head" data-id="'+cat.id+'">'+
          '<div class="ccat-emo" style="background:'+cat.bg+'">'+cat.emoji+'</div>'+
          '<div class="ccat-info">'+

            '<div class="ccat-meta">'+cat.cards.length+' CARDS</div>'+
          '</div>'+
          '<div class="ccat-acts">'+
            '<button class="ccat-btn ccat-expand" type="button">&#9662; Cards</button>'+
            '<button class="ccat-btn ccat-del" type="button" data-seg="'+activeSeg+'" data-id="'+cat.id+'">&#10005;</button>'+
          '</div>'+
        '</div>'+
        '<div id="body-'+cat.id+'" style="display:none">'+
          '<div class="card-items">'+
            (cat.cards.length===0 ? '<div style="padding:14px 0;font-size:13px;color:#555;font-style:italic">No cards yet</div>' : cardRows)+
          '</div>'+
          '<div class="add-tabs">'+
            '<button class="add-tab on" type="button" id="ts-'+cat.id+'">+ SINGLE</button>'+
            '<button class="add-tab" type="button" id="tb-'+cat.id+'">&#9889; BULK</button>'+
          '</div>'+
          '<div class="add-card-form" id="ps-'+cat.id+'">'+
            '<div style="margin-bottom:8px"><label class="flabel">QUESTION</label><textarea class="finp ftextarea" id="nq-'+cat.id+'" placeholder="Type question here..."></textarea></div>'+
            '<div style="margin-bottom:12px"><label class="flabel">HINT (optional)</label><input class="finp" id="nh-'+cat.id+'" placeholder="e.g. Be honest"></div>'+
            '<button class="fbtn-main" type="button" data-seg="'+activeSeg+'" data-cat="'+cat.id+'">Add Card &#10003;</button>'+
          '</div>'+
          '<div class="bulk-box" id="pb-'+cat.id+'" style="display:none">'+
            '<div class="bulk-hint">One question per line. Add hint after <code>|</code><br>Example: <code>What scares you? | Be honest</code></div>'+
            '<label class="flabel">PASTE QUESTIONS</label>'+
            '<textarea class="finp ftextarea" id="bk-'+cat.id+'" style="min-height:120px" placeholder="Question one&#10;Question two | hint here" data-cat="'+cat.id+'"></textarea>'+

  var container = document.getElementById("cat-cards");

  container.querySelectorAll(".ccat-head").forEach(function(el){
    el.addEventListener("click", function(){ toggleCat(el.dataset.id); });

    el.addEventListener("click", function(e){
      e.stopPropagation();
      deleteCat(el.dataset.seg, el.dataset.id);

    el.addEventListener("click", function(){
      openEdit(el.dataset.seg, el.dataset.cat, parseInt(el.dataset.ci, 10));

    el.addEventListener("click", function(){

  container.querySelectorAll(".bulk-box .fbtn-main").forEach(function(el){
    el.addEventListener("click", function(){ addBulk(el.dataset.seg, el.dataset.bcat); });
  });

function toggleCat(id){
  var b = document.getElementById("body-" + id);
  if(b) b.style.display = b.style.display === "none" ? "block" : "none";
}

function reopenCat(id){
  var b = document.getElementById("body-" + id);
  if(b) b.style.display = "block";
}

function switchTab(catId, tab){
  var ps = document.getElementById("ps-" + catId);
  var pb = document.getElementById("pb-" + catId);
  var ts = document.getElementById("ts-" + catId);
  var tb = document.getElementById("tb-" + catId);

  if(tab === "single"){
    ps.style.display = "block";
    pb.style.display = "none";
    ts.classList.add("on");
    tb.classList.remove("on");
  } else {
    ps.style.display = "none";
    pb.style.display = "block";
    ts.classList.remove("on");
    tb.classList.add("on");
  }
}

function toggleAddCat(){
  var f = document.getElementById("add-cat-form");
  f.style.display = f.style.display === "none" ? "block" : "none";
}

function addCat(){
  var name = document.getElementById("nc-name").value.trim();
  var desc = document.getElementById("nc-desc").value.trim();
  var emoji = document.getElementById("nc-emoji").value.trim() || "✨";
  var bg = document.getElementById("nc-bg").value.trim() || "#0E0B18";
  var accent = document.getElementById("nc-accent").value.trim() || "#8B5CF6";

  if(!name){
    showToast("Name required","err");
    return;
  }

  var id = "cat-" + Date.now();
  DATA[activeSeg].push({
    id:id,
    name:name,
    desc:desc || "Explore",
    emoji:emoji,
    bg:bg,
    accent:accent,
    hint:"Take your time",
    cards:[]
  });

  saveData();
  renderCats();
  toggleAddCat();

  document.getElementById("nc-name").value = "";
  document.getElementById("nc-desc").value = "";
  document.getElementById("nc-emoji").value = "";

  showToast("Category created!");
}

function deleteCat(seg,id){
  if(!confirm("Delete this category and ALL its cards?")) return;
  DATA[seg] = DATA[seg].filter(function(c){ return c.id !== id; });
  saveData();
  renderCats();
}

function addCard(seg,catId){
  var q = document.getElementById("nq-" + catId).value.trim();
  var h = document.getElementById("nh-" + catId).value.trim();

  if(!q){
    showToast("Question required","err");
    return;
  }

  var cat = DATA[seg].find(function(c){ return c.id === catId; });
  if(!cat) return;

  cat.cards.push({ q:q, hint:h || "" });

  saveData();
  renderCats();
  setTimeout(function(){ reopenCat(catId); },50);
  showToast("Card added!");
}

function parseBulk(raw){
  return (raw || "")
    .split("\n")
    .map(function(l){ return l.trim(); })
    .filter(function(l){ return l.length > 0; })
    .map(function(l){
      var p = l.split("|");
      return { q:p[0].trim(), hint:p[1] ? p[1].trim() : "" };
    })
    .filter(function(x){ return x.q.length > 0; });
}

function previewBulk(catId){
  var raw = document.getElementById("bk-" + catId).value;
  var lines = parseBulk(raw);
  var box = document.getElementById("bp-" + catId);

  if(!lines.length){
    box.style.display = "none";
    return;
  }

  box.style.display = "block";
  box.innerHTML =
    '<div class="bulk-count">'+lines.length+' question'+(lines.length !== 1 ? 's' : '')+' ready</div>' +
    lines.map(function(l,i){
      return '<div class="bulk-preview-item"><strong style="color:#8B5CF6">'+(i+1)+'.</strong> '+
        esc(l.q) + (l.hint ? ' <span style="color:#666">· '+esc(l.hint)+'</span>' : '') +
      '</div>';
    }).join("");
}

function addBulk(seg,catId){
  var raw = document.getElementById("bk-" + catId).value;
  var lines = parseBulk(raw);

  if(!lines.length){
    showToast("No questions found","err");
    return;
  }

  var cat = DATA[seg].find(function(c){ return c.id === catId; });
  if(!cat) return;

  lines.forEach(function(item){
    cat.cards.push({ q:item.q, hint:item.hint });
  });

  saveData();
  renderCats();
  setTimeout(function(){ reopenCat(catId); },50);
  showToast(lines.length + " cards added!");
}

function deleteCard(seg,catId,idx){
  if(!confirm("Delete this card?")) return;

  var cat = DATA[seg].find(function(c){ return c.id === catId; });
  if(!cat) return;

  cat.cards.splice(idx,1);
  saveData();
  renderCats();
  setTimeout(function(){ reopenCat(catId); },50);
}

function openEdit(seg,catId,idx){
  var cat = DATA[seg].find(function(c){ return c.id === catId; });
  if(!cat) return;

  editTarget = { seg:seg, catId:catId, idx:idx };

  document.getElementById("edit-content").innerHTML =
    '<div style="margin-bottom:12px"><label class="flabel">QUESTION</label><textarea class="finp ftextarea" id="eq">'+esc(cat.cards[idx].q || "")+'</textarea></div>' +
    '<div><label class="flabel">HINT</label><input class="finp" id="eh" value="'+esc(cat.cards[idx].hint || "")+'"></div>';

  document.getElementById("edit-modal").classList.add("open");
}

function closeEdit(){
  document.getElementById("edit-modal").classList.remove("open");
  editTarget = null;
}

function saveEdit(){
  if(!editTarget) return;

  var cat = DATA[editTarget.seg].find(function(c){ return c.id === editTarget.catId; });
  if(!cat) return;

  var q = document.getElementById("eq").value.trim();
  var h = document.getElementById("eh").value.trim();

  if(!q){
    showToast("Question required","err");
    return;
  }

  var savedCatId = editTarget.catId;
  cat.cards[editTarget.idx] = { q:q, hint:h || "" };

  saveData();
  renderCats();
  closeEdit();
  setTimeout(function(){ reopenCat(savedCatId); },50);
  showToast("Updated!");
}

function exportApp(){
  try {
    var s = localStorage.getItem("koino_data");
    if(s) DATA = JSON.parse(s);
  } catch(e) {}

  var total = Object.values(DATA).reduce(function(a,seg){
    return a + seg.reduce(function(b,c){ return b + c.cards.length; },0);
  },0);

  showToast("Building...");

  setTimeout(function(){
    var b64 = document.getElementById("APP_TPL").textContent.trim();
    var tpl = atob(b64);
    var dataStr = JSON.stringify(DATA);
    var appHTML = tpl.replace('"%%KOINO_DATA%%"', dataStr);

    var blob = new Blob([appHTML], { type:"text/html;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "koino_app.html";

    document.body.appendChild(a);
    a.click();

    setTimeout(function(){
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    },300);

    showToast(total + " cards downloaded!");
  },200);
}

function esc(s){
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function showToast(m,type){
  var t = document.getElementById("toast");
  t.textContent = m;
  t.className = "toast" + (type ? " " + type : "");
  void t.offsetWidth;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}
</script>
